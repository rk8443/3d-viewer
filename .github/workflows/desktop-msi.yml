name: Build Windows MSI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build MSI on Windows
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: artifacts/point-cloud-viewer/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri MSI + NSIS installer
        working-directory: artifacts/point-cloud-viewer
        env:
          # Satisfy vite.config.ts in Tauri build mode.
          TAURI_BUILD: "1"
        run: pnpm run tauri build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3D-Viewer-windows-installers
          path: |
            artifacts/point-cloud-viewer/src-tauri/target/release/bundle/msi/*.msi
            artifacts/point-cloud-viewer/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/point-cloud-viewer/src-tauri/target/release/bundle/msi/*.msi
            artifacts/point-cloud-viewer/src-tauri/target/release/bundle/nsis/*.exe
