kind = "web"
previewPath = "/"
title = "LMI 3D Point Cloud Viewer"
version = "1.0.0"
id = "artifacts/point-cloud-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22396

[services.development]
run = "pnpm --filter @workspace/point-cloud-viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/point-cloud-viewer", "run", "build" ]
publicDir = "artifacts/point-cloud-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22396"
BASE_PATH = "/"
